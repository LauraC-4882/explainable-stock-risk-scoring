<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Risk Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #07090f;
  --surface:  #0d1117;
  --surface2: #161b22;
  --border:   #21262d;
  --accent:   #58a6ff;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --low:      #3fb950;
  --moderate: #d29922;
  --high:     #f0883e;
  --extreme:  #f85149;
  --up:       #3fb950;
  --down:     #f85149;
  --r:        12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────────────────── */
.header {
  background: linear-gradient(160deg, #0d1117 0%, #111827 100%);
  border-bottom: 1px solid var(--border);
  padding: 22px 32px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header-logo { font-size: 1.7rem; }
.header-text h1 {
  font-size: 1.35rem;
  font-weight: 800;
  background: linear-gradient(90deg, #58a6ff 0%, #bc8cff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.3px;
}
.header-text p { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

/* ── Controls ────────────────────────────────────────────── */
.controls {
  padding: 24px 32px 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 700px;
}
.search-wrap { position: relative; }
.search-wrap svg.icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 17px;
  height: 17px;
  stroke: var(--muted);
  fill: none;
  stroke-width: 2;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 11px 14px 11px 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.92rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#searchInput::placeholder { color: var(--muted); }
#searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.12); }

.dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  z-index: 200;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.dropdown.open { display: block; }
.drop-item {
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.drop-item:last-child { border-bottom: none; }
.drop-item:hover { background: rgba(88,166,255,.07); }
.drop-sym { font-weight: 700; color: var(--accent); font-size: 0.88rem; }
.drop-name { color: var(--muted); font-size: 0.8rem; margin-left: 8px; }
.drop-exch { color: var(--muted); font-size: 0.75rem; }

.tf-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tf {
  padding: 5px 15px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.tf:hover { border-color: var(--accent); color: var(--accent); }
.tf.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* ── Empty state ─────────────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 72px 32px 80px;
  gap: 10px;
}
.empty .big-icon { font-size: 3.5rem; line-height: 1; }
.empty h2 { font-size: 1.15rem; font-weight: 700; margin-top: 4px; }
.empty p { color: var(--muted); font-size: 0.85rem; max-width: 340px; line-height: 1.6; }
.pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.pill {
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--accent);
  font-weight: 700;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}
.pill:hover { background: rgba(88,166,255,.1); border-color: var(--accent); transform: translateY(-1px); }

/* ── Grid ────────────────────────────────────────────────── */
.grid {
  padding: 28px 32px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 22px;
}

/* ── Card ────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: #30363d; box-shadow: 0 6px 28px rgba(0,0,0,.4); }

.card-head {
  padding: 16px 18px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.card-ticker { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
.card-name { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
.btn-remove {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1rem; padding: 2px 6px;
  border-radius: 6px; line-height: 1; transition: all 0.15s;
}
.btn-remove:hover { color: var(--extreme); background: rgba(248,81,73,.1); }

/* Loading */
.card-load {
  display: flex; align-items: center; justify-content: center;
  padding: 52px; gap: 10px; color: var(--muted); font-size: 0.85rem;
}
.spin {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Risk section ────────────────────────────────────────── */
.risk-row {
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 1px solid var(--border);
}
.gauge-wrap { flex-shrink: 0; }

.score-big {
  font-size: 2.8rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -2px;
}
.risk-badge {
  display: inline-block;
  padding: 3px 11px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-top: 7px;
}
.risk-badge.LOW      { background: rgba(63,185,80,.15);  color: var(--low); }
.risk-badge.MODERATE { background: rgba(210,153,34,.15); color: var(--moderate); }
.risk-badge.HIGH     { background: rgba(240,136,62,.15); color: var(--high); }
.risk-badge.EXTREME  { background: rgba(248,81,73,.15);  color: var(--extreme); }
.score-sub { color: var(--muted); font-size: 0.73rem; margin-top: 5px; }

/* ── Direction ───────────────────────────────────────────── */
.dir-section {
  padding: 14px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.dir-heading {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 11px;
  font-weight: 600;
}
.dir-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.dir-row:last-of-type { margin-bottom: 0; }
.dir-lbl { width: 80px; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
.dir-lbl.up   { color: var(--up); }
.dir-lbl.down { color: var(--down); }
.bar-bg { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.bar-fill.up   { background: linear-gradient(90deg, #1a7f37, #3fb950); }
.bar-fill.down { background: linear-gradient(90deg, #b91c1c, #f85149); }
.dir-pct { width: 38px; text-align: right; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
.dir-pct.up   { color: var(--up); }
.dir-pct.down { color: var(--down); }
.dir-verdict {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}
.dir-verdict.bull { background: rgba(63,185,80,.13); color: var(--up); }
.dir-verdict.bear { background: rgba(248,81,73,.13); color: var(--down); }
.dir-verdict.flat { background: rgba(139,148,158,.1); color: var(--muted); }

/* ── Metric tiles ────────────────────────────────────────── */
.tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}
.tile { padding: 11px 14px; border-right: 1px solid var(--border); }
.tile:last-child { border-right: none; }
.tile-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; }
.tile-val { font-size: 0.92rem; font-weight: 700; margin-top: 3px; }

/* ── Charts ──────────────────────────────────────────────── */
.charts { padding: 14px 18px 18px; }
.chart-lbl {
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 6px;
}
.chart-box { height: 110px; margin-bottom: 14px; }
.chart-box:last-child { margin-bottom: 0; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 640px) {
  .controls, .grid { padding-left: 16px; padding-right: 16px; }
  .grid { grid-template-columns: 1fr; }
  .tiles { grid-template-columns: repeat(2, 1fr); }
  .tile:nth-child(2) { border-right: none; }
  .tile:nth-child(3) { border-right: 1px solid var(--border); }
  .header { padding: 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">📉</div>
  <div class="header-text">
    <h1>Stock Risk Analyzer</h1>
    <p>Real-time downside risk · direction signals · live data via yfinance</p>
  </div>
</header>

<!-- Search + Timeframe -->
<div class="controls">
  <div class="search-wrap" id="searchWrap">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Search stocks — Apple, TSLA, NVDA, 0700.HK…" autocomplete="off" spellcheck="false">
    <div id="dropdown" class="dropdown"></div>
  </div>
  <div class="tf-row">
    <button class="tf" data-p="5d">5D</button>
    <button class="tf active" data-p="1mo">1M</button>
    <button class="tf" data-p="3mo">3M</button>
    <button class="tf" data-p="6mo">6M</button>
    <button class="tf" data-p="1y">1Y</button>
    <button class="tf" data-p="2y">2Y</button>
  </div>
</div>

<!-- Empty state -->
<div class="empty" id="empty">
  <div class="big-icon">📊</div>
  <h2>Search any stock to see its risk</h2>
  <p>Type a company name or ticker above. Scores update live using real market data.</p>
  <div class="pills">
    <button class="pill" onclick="addStock('AAPL')">AAPL</button>
    <button class="pill" onclick="addStock('TSLA')">TSLA</button>
    <button class="pill" onclick="addStock('MSFT')">MSFT</button>
    <button class="pill" onclick="addStock('GOOGL')">GOOGL</button>
    <button class="pill" onclick="addStock('NVDA')">NVDA</button>
    <button class="pill" onclick="addStock('AMZN')">AMZN</button>
    <button class="pill" onclick="addStock('META')">META</button>
    <button class="pill" onclick="addStock('JPM')">JPM</button>
  </div>
</div>

<!-- Stocks grid -->
<div class="grid" id="grid" style="display:none"></div>

<script>
// ─────────────────────────────────── State
const S = { tickers: new Set(), period: '1mo', charts: {} };

// ─────────────────────────────────── Helpers
const $  = id => document.getElementById(id);
const rc = lbl => ({ LOW:'#3fb950', MODERATE:'#d29922', HIGH:'#f0883e', EXTREME:'#f85149' }[lbl] || '#8b949e');

function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function fmt(v, mul = 1, dp = 1, suffix = '') {
  if (v == null || isNaN(v)) return '—';
  return (v * mul).toFixed(dp) + suffix;
}

// ─────────────────────────────────── SVG Gauge
function gauge(score, label) {
  const color = rc(label);
  const pct   = Math.min(+score, 100) / 100;
  const R = 50, cx = 58, cy = 58;
  function pt(a) { return [cx + R * Math.cos(a), cy + R * Math.sin(a)]; }
  const [sx, sy] = pt(Math.PI);
  const [ex, ey] = pt(2 * Math.PI);
  const angle    = Math.PI + pct * Math.PI;
  const [vx, vy] = pt(angle);
  const large    = pct > 0.5 ? 1 : 0;
  const track    = `M ${sx} ${sy} A ${R} ${R} 0 0 1 ${ex} ${ey}`;
  const fill     = pct > 0.005
    ? `M ${sx} ${sy} A ${R} ${R} 0 ${large} 1 ${vx} ${vy}` : '';

  // Tick marks at 25, 50, 75
  const ticks = [0.25, 0.5, 0.75].map(p => {
    const a = Math.PI + p * Math.PI;
    const [x1,y1] = pt(a);
    const [x2,y2] = [cx + (R+5)*Math.cos(a), cy + (R+5)*Math.sin(a)];
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#21262d" stroke-width="2"/>`;
  }).join('');

  return `<svg width="116" height="68" viewBox="0 0 116 68" overflow="visible">
    ${ticks}
    <path d="${track}" fill="none" stroke="#21262d" stroke-width="9" stroke-linecap="round"/>
    ${fill ? `<path d="${fill}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"/>` : ''}
    <text x="${cx}" y="56" text-anchor="middle" fill="${color}" font-size="14" font-weight="900"
      font-family="-apple-system,system-ui,sans-serif">${Math.round(score)}</text>
    <text x="8" y="66" fill="#8b949e" font-size="8.5" font-family="system-ui">0</text>
    <text x="${cx-6}" y="10" fill="#8b949e" font-size="8.5" font-family="system-ui">50</text>
    <text x="98" y="66" fill="#8b949e" font-size="8.5" font-family="system-ui">100</text>
  </svg>`;
}

// ─────────────────────────────────── API
async function apiSearch(q) {
  const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  return r.ok ? r.json() : [];
}
async function apiScore(ticker) {
  const r = await fetch(`/api/score/${ticker}`);
  if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Failed'); }
  return r.json();
}
async function apiTs(ticker) {
  const r = await fetch(`/api/score/${ticker}/timeseries?period=${S.period}`);
  if (!r.ok) throw new Error('Timeseries failed');
  return r.json();
}

// ─────────────────────────────────── Search
const dd  = $('dropdown');
const inp = $('searchInput');

const doSearch = debounce(async q => {
  if (!q.trim()) { closeDrop(); return; }
  const res = await apiSearch(q);
  if (!res.length) { closeDrop(); return; }
  dd.innerHTML = res.map(r => `
    <div class="drop-item" onclick="addStock('${r.symbol}');closeDrop()">
      <div>
        <span class="drop-sym">${r.symbol}</span>
        <span class="drop-name">${r.name || ''}</span>
      </div>
      <span class="drop-exch">${r.exchange || ''}</span>
    </div>`).join('');
  dd.classList.add('open');
}, 320);

inp.addEventListener('input', e => doSearch(e.target.value));
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = e.target.value.trim().toUpperCase();
    if (v) { addStock(v); closeDrop(); inp.value = ''; }
  }
  if (e.key === 'Escape') closeDrop();
});
document.addEventListener('click', e => {
  if (!e.target.closest('#searchWrap')) closeDrop();
});

function closeDrop() { dd.classList.remove('open'); dd.innerHTML = ''; }

// ─────────────────────────────────── Timeframe
document.querySelectorAll('.tf').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.period = btn.dataset.p;
    S.tickers.forEach(t => refreshTs(t));
  });
});

// ─────────────────────────────────── Card lifecycle
function addStock(ticker) {
  ticker = ticker.toUpperCase().trim();
  closeDrop();
  inp.value = '';
  if (S.tickers.has(ticker)) {
    $(`card-${ticker}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  S.tickers.add(ticker);
  syncEmpty();

  const grid = $('grid');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${ticker}`;
  card.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-ticker">${ticker}</div>
        <div class="card-name" id="cname-${ticker}">Fetching…</div>
      </div>
      <button class="btn-remove" onclick="removeStock('${ticker}')" title="Remove">✕</button>
    </div>
    <div class="card-load" id="cload-${ticker}">
      <div class="spin"></div> Loading live data…
    </div>`;
  grid.appendChild(card);
  loadStock(ticker);
}

function removeStock(ticker) {
  S.tickers.delete(ticker);
  $(`card-${ticker}`)?.remove();
  if (S.charts[ticker]) {
    S.charts[ticker].price?.destroy();
    S.charts[ticker].risk?.destroy();
    delete S.charts[ticker];
  }
  syncEmpty();
}

function syncEmpty() {
  const hasStocks = S.tickers.size > 0;
  $('empty').style.display = hasStocks ? 'none' : '';
  $('grid').style.display  = hasStocks ? '' : 'none';
}

async function loadStock(ticker) {
  try {
    const [sc, ts] = await Promise.all([apiScore(ticker), apiTs(ticker)]);
    renderCard(ticker, sc, ts);
  } catch (err) {
    const el = $(`cload-${ticker}`);
    if (el) el.innerHTML = `<span style="color:var(--extreme)">⚠ ${err.message}</span>`;
  }
}

async function refreshTs(ticker) {
  try {
    const ts = await apiTs(ticker);
    updateCharts(ticker, ts);
    updateDir(ticker, ts);
  } catch (_) {}
}

// ─────────────────────────────────── Render card
function renderCard(ticker, sc, ts) {
  const card = $(`card-${ticker}`);
  if (!card) return;

  // Company name
  const nameEl = $(`cname-${ticker}`);
  if (nameEl) nameEl.textContent = sc.name && sc.name !== ticker
    ? sc.name + (sc.fundamentals?.sector ? ` · ${sc.fundamentals.sector}` : '')
    : (sc.fundamentals?.sector || ticker);

  $(`cload-${ticker}`)?.remove();

  const last   = ts.length ? ts[ts.length - 1] : null;
  const upProb = last?.up_prob ?? 0.5;
  const dnProb = last?.down_prob ?? 0.5;
  const verdict = upProb > 0.55 ? 'bull' : upProb < 0.45 ? 'bear' : 'flat';
  const verdictTxt = { bull: '↑ Likely to INCREASE', bear: '↓ Likely to DECREASE', flat: '→ Neutral — unclear direction' }[verdict];
  const color = rc(sc.risk_label);

  const body = document.createElement('div');
  body.innerHTML = `
    <!-- Risk gauge -->
    <div class="risk-row">
      <div class="gauge-wrap">${gauge(sc.risk_score, sc.risk_label)}</div>
      <div>
        <div class="score-big" style="color:${color}">${sc.risk_score}</div>
        <div class="risk-badge ${sc.risk_label}">${sc.risk_label}</div>
        <div class="score-sub">risk score out of 100</div>
      </div>
    </div>

    <!-- Direction signal -->
    <div class="dir-section">
      <div class="dir-heading">Today's Direction Signal</div>
      <div class="dir-row">
        <span class="dir-lbl up">↑ Upside</span>
        <div class="bar-bg"><div class="bar-fill up" id="bar-up-${ticker}" style="width:${(upProb*100).toFixed(1)}%"></div></div>
        <span class="dir-pct up" id="pct-up-${ticker}">${(upProb*100).toFixed(0)}%</span>
      </div>
      <div class="dir-row">
        <span class="dir-lbl down">↓ Downside</span>
        <div class="bar-bg"><div class="bar-fill down" id="bar-dn-${ticker}" style="width:${(dnProb*100).toFixed(1)}%"></div></div>
        <span class="dir-pct down" id="pct-dn-${ticker}">${(dnProb*100).toFixed(0)}%</span>
      </div>
      <div class="dir-verdict ${verdict}">${verdictTxt}</div>
    </div>

    <!-- Key metrics -->
    <div class="tiles">
      <div class="tile">
        <div class="tile-lbl">30d Vol</div>
        <div class="tile-val">${fmt(sc.volatility_30d, 100, 1, '%')}</div>
      </div>
      <div class="tile">
        <div class="tile-lbl">VaR 95%</div>
        <div class="tile-val" style="color:var(--extreme)">${fmt(sc.var_95, 100, 2, '%')}</div>
      </div>
      <div class="tile">
        <div class="tile-lbl">Beta</div>
        <div class="tile-val">${sc.beta != null ? (+sc.beta).toFixed(2) : '—'}</div>
      </div>
      <div class="tile">
        <div class="tile-lbl">RSI 14</div>
        <div class="tile-val" style="color:${sc.indicators?.rsi_14 > 70 ? 'var(--extreme)' : sc.indicators?.rsi_14 < 30 ? 'var(--low)' : 'inherit'}">${fmt(sc.indicators?.rsi_14, 1, 1)}</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-lbl">Price History</div>
      <div class="chart-box"><canvas id="ch-price-${ticker}"></canvas></div>
      <div class="chart-lbl">Daily Risk Score (0–100)</div>
      <div class="chart-box"><canvas id="ch-risk-${ticker}"></canvas></div>
    </div>`;

  card.appendChild(body);
  buildCharts(ticker, ts, color);
}

// ─────────────────────────────────── Charts
const CHART_BASE = {
  animation: { duration: 500 },
  plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false,
    callbacks: { title: items => items[0]?.label || '' } } },
  scales: {
    x: { display: false },
    y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 10 } }, border: { display: false } },
  },
  elements: { point: { radius: 0, hoverRadius: 4 } },
  maintainAspectRatio: false,
};

function buildCharts(ticker, ts, color) {
  S.charts[ticker]?.price?.destroy();
  S.charts[ticker]?.risk?.destroy();

  const dates  = ts.map(d => d.date);
  const closes = ts.map(d => d.close);
  const risks  = ts.map(d => d.risk_score);

  const pCtx = $(`ch-price-${ticker}`)?.getContext('2d');
  const rCtx = $(`ch-risk-${ticker}`)?.getContext('2d');
  if (!pCtx || !rCtx) return;

  const pGrad = pCtx.createLinearGradient(0, 0, 0, 110);
  pGrad.addColorStop(0, color + '44');
  pGrad.addColorStop(1, color + '00');

  const priceChart = new Chart(pCtx, {
    type: 'line',
    data: { labels: dates, datasets: [{ data: closes, borderColor: color, backgroundColor: pGrad, borderWidth: 1.5, fill: true, tension: 0.3 }] },
    options: { ...CHART_BASE, plugins: { ...CHART_BASE.plugins, tooltip: { ...CHART_BASE.plugins.tooltip,
      callbacks: { ...CHART_BASE.plugins.tooltip.callbacks, label: i => ` $${i.parsed.y.toFixed(2)}` } } } },
  });

  const rGrad = rCtx.createLinearGradient(0, 0, 0, 110);
  rGrad.addColorStop(0,   'rgba(248,81,73,.35)');
  rGrad.addColorStop(0.5, 'rgba(240,136,62,.2)');
  rGrad.addColorStop(1,   'rgba(63,185,80,.0)');

  const riskChart = new Chart(rCtx, {
    type: 'line',
    data: { labels: dates, datasets: [{
      data: risks,
      borderColor: ctx => { const v = ctx.p1?.parsed?.y ?? 0; return v < 25 ? '#3fb950' : v < 50 ? '#d29922' : v < 75 ? '#f0883e' : '#f85149'; },
      backgroundColor: rGrad,
      borderWidth: 1.5, fill: true, tension: 0.3,
      segment: { borderColor: ctx => { const v = ctx.p1.parsed.y; return v < 25 ? '#3fb950' : v < 50 ? '#d29922' : v < 75 ? '#f0883e' : '#f85149'; } },
    }] },
    options: { ...CHART_BASE,
      scales: { ...CHART_BASE.scales, y: { ...CHART_BASE.scales.y, min: 0, max: 100,
        ticks: { ...CHART_BASE.scales.y.ticks, callback: v => [0,25,50,75,100].includes(v) ? v : '' } } } },
  });

  S.charts[ticker] = { price: priceChart, risk: riskChart };
}

function updateCharts(ticker, ts) {
  const c = S.charts[ticker];
  if (!c) return;
  const dates = ts.map(d => d.date);
  if (c.price) { c.price.data.labels = dates; c.price.data.datasets[0].data = ts.map(d => d.close); c.price.update(); }
  if (c.risk)  { c.risk.data.labels  = dates; c.risk.data.datasets[0].data  = ts.map(d => d.risk_score); c.risk.update(); }
}

function updateDir(ticker, ts) {
  const last = ts.length ? ts[ts.length - 1] : null;
  if (!last) return;
  const up = last.up_prob, dn = last.down_prob;
  const bu = $(`bar-up-${ticker}`), bd = $(`bar-dn-${ticker}`);
  const pu = $(`pct-up-${ticker}`), pd = $(`pct-dn-${ticker}`);
  if (bu) bu.style.width = `${(up*100).toFixed(1)}%`;
  if (bd) bd.style.width = `${(dn*100).toFixed(1)}%`;
  if (pu) pu.textContent = `${(up*100).toFixed(0)}%`;
  if (pd) pd.textContent = `${(dn*100).toFixed(0)}%`;
}
</script>
</body>
