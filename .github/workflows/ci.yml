name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "snapshots/**" # daily data refresh commits don't need a CI run
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src/ tests/

      - name: Test
        run: pytest tests/ -v --tb=short

      # Exit-code contract (see scripts/smoke.py): 0 = gate ran and passed;
      # 75 = Yahoo rate-limited the data fetch, gate DID NOT run (GitHub
      # runner IPs get intermittently throttled — observed live 2026-07-18/19
      # after five green runs on the same workflow the day before); anything
      # else = real failure. 75 becomes a loud warning + neutral pass so an
      # external outage can't mask unrelated regressions or block every push,
      # while the gate stays active for runs where the fetch goes through.
      - name: Smoke test (train -> serve -> real HTTP -> JSON)
        shell: bash
        run: |
          set +e
          python scripts/smoke.py
          code=$?
          set -e
          if [ "$code" -eq 75 ]; then
            echo "::warning title=smoke skipped::Yahoo rate-limited the runner IP — the smoke gate did not run. Verify locally with 'make smoke' before trusting this commit end-to-end."
            exit 0
          fi
          exit $code
