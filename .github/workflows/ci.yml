name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "snapshots/**" # daily data refresh commits don't need a CI run
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src/ tests/ alembic/

      - name: Test
        run: pytest tests/ -v --tb=short

      # [R1] Migration gate. tests/test_migrations.py already asserts the
      # models and the migration head can't drift, but it does so through the
      # app's own helper. This runs the real `alembic` CLI end to end against a
      # scratch database — catching anything that breaks the command-line path
      # specifically (a bad script_location, an env.py import error, a
      # revision file that imports something not installed in a clean env),
      # which is the path a deploy actually uses.
      - name: Migration round trip (upgrade -> downgrade -> upgrade)
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/ci_migrations.db
        run: |
          python -m alembic upgrade head
          python -m alembic current
          python -m alembic downgrade base
          python -m alembic upgrade head

      # [R6] Tail backtests run offline from the committed snapshots, so they
      # are deterministic and can gate every push — unlike `make validate`,
      # which needs a live fetch and would make CI depend on Yahoo being up.
      # This asserts the suite still executes end to end; the *findings*
      # (breaches cluster, ES understates severity) are documented in the
      # README rather than asserted, since they're measurements of the current
      # estimator and are expected to move as it changes.
      - name: Tail-risk validation suite
        run: python scripts/validate_tail.py

      # A migration is only half the story — the rollback plan is the backup.
      # This proves the backup/restore path works on every push, not just that
      # the code for it exists.
      - name: Backup + restore drill
        env:
          DATABASE_URL: sqlite:///${{ runner.temp }}/ci_migrations.db
        run: |
          python scripts/backup_db.py create
          python scripts/backup_db.py list
          python scripts/backup_db.py drill

  # [R3] The frontend used to have zero CI coverage: 6,600 lines of JSX where a
  # syntax error could reach main and only surface when someone built locally.
  # Separate job so a backend failure and a frontend failure are distinguishable
  # at a glance, and so they run concurrently.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/web/package-lock.json

      # `npm ci` not `npm install`: installs exactly the lockfile, and fails if
      # package.json and the lockfile have drifted — which is the point of
      # committing a lockfile at all.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit + component tests
        run: npm run test:run

      # A clean build proves the bundler is happy, which the tests above do not:
      # they run modules through vite's transform, never through a full
      # production build with minification and tree-shaking.
      - name: Build
        run: npm run build

      # The live smoke test (train -> serve -> real HTTP) was removed from CI:
      # it makes a real yfinance fetch, and GitHub runner IPs are chronically
      # rate-limited by Yahoo, so it failed the pipeline for reasons unrelated
      # to any change. CI's real coverage lives in the deterministic, offline
      # gates instead — the 425-test suite, the migration round trip, the
      # backup/restore drill, and the snapshot-backed tail validation, none of
      # which touch the network. `scripts/smoke.py` remains available to run
      # locally where an unthrottled connection exists.
